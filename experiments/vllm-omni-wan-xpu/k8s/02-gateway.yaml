# llm-d "infra" layer analog: a Gateway (istio) + HTTPRoute fronting the wan-omni
# Service. This is the part of llm-d that DOES apply to an omni/diffusion backend:
# the gateway gives a single stable entrypoint and L7 routing. (The EPP/InferencePool
# scheduler in 03-inferencepool.yaml is the part that does NOT meaningfully apply —
# see findings/analysis: no KV cache, no /v1/chat/completions, job-based /v1/videos.)
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: wan-omni-gateway
  namespace: llm-d
spec:
  gatewayClassName: istio
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: wan-omni-route
  namespace: llm-d
spec:
  parentRefs:
    - name: wan-omni-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1/videos
        - path:
            type: PathPrefix
            value: /v1/models
        - path:
            type: PathPrefix
            value: /health
      backendRefs:
        - name: wan-omni
          port: 8000
