name: Nightly - PD Disaggregation E2E (XPU)

# Nightly regression test for the pd-disaggregation guide on the
# self-hosted xpu runner. Deploys via helmfile (xpu env) and validates
# with e2e-validate.sh.

on:
  schedule:
    - cron: '30 10 * * *'  # 10:30 UTC daily (staggered)
  workflow_dispatch:
    inputs:
      skip_cleanup:
        description: 'Skip cleanup after tests (for debugging)'
        required: false
        default: 'false'

permissions:
  contents: read

concurrency:
  group: nightly-e2e-pd-disaggregation-xpu
  cancel-in-progress: true

jobs:
  nightly:
    if: github.repository == 'llm-d/llm-d'
    uses: llm-d/llm-d-infra/.github/workflows/reusable-nightly-e2e-xpu-helmfile.yaml@main
    with:
      guide_name: pd-disaggregation
      namespace: llm-d-nightly-pd-xpu
      release_name_postfix: pd
      httproute_file: httproute.yaml
      pod_wait_timeout: '10m'
      llm_d_ref: ${{ github.ref }}
      skip_cleanup: ${{ github.event.inputs.skip_cleanup == 'true' }}
    secrets: inherit
