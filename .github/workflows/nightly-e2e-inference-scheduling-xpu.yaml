name: Nightly - Inference Scheduling E2E (XPU)

# Nightly regression test for the inference-scheduling guide on the
# self-hosted xpu runner. Deploys via helmfile (xpu env) and validates
# with e2e-validate.sh.

on:
  schedule:
    - cron: '0 10 * * *'  # 10:00 UTC daily (3AM PST)
  workflow_dispatch:
    inputs:
      skip_cleanup:
        description: 'Skip cleanup after tests (for debugging)'
        required: false
        default: 'false'

permissions:
  contents: read

concurrency:
  group: nightly-e2e-inference-scheduling-xpu
  cancel-in-progress: true

jobs:
  nightly:
    if: github.repository == 'llm-d/llm-d'
    uses: llm-d/llm-d-infra/.github/workflows/reusable-nightly-e2e-xpu-helmfile.yaml@main
    with:
      guide_name: inference-scheduling
      namespace: llm-d-nightly-is-xpu
      release_name_postfix: inference-scheduling
      httproute_file: guides/inference-scheduling/httproute.yaml
      pod_wait_timeout: '10m'
      llm_d_ref: ${{ github.ref }}
      skip_cleanup: ${{ github.event.inputs.skip_cleanup == 'true' }}
    secrets: inherit
