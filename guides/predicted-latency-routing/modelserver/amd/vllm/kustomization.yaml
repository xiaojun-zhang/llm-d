apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../../recipes/modelserver/base/single-host/default

namePrefix: predicted-latency-routing-rocm-vllm-

components:
  - ../../../../recipes/modelserver/components/images/amd-vllm

# Re-label the pool as llm-d.ai/guide=optimized-baseline so the router values shipped with
# this guide (which select that label) match without any override — same as the GPU path.
labels:
  - pairs:
      llm-d.ai/guide: optimized-baseline
      llm-d.ai/accelerator-variant: gpu
      llm-d.ai/accelerator-vendor: amd
    includeSelectors: true
    includeTemplates: true
patches:
  - path: patch-vllm.yaml
