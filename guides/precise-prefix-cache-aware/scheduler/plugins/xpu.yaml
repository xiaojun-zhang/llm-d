# Per-accelerator plugin override for the Intel XPU overlay.
# Pairs 1:1 with modelserver/xpu/vllm/ (Qwen/Qwen3-0.6B, --block-size=64).
# Loaded on the helm command via:
#   --set-file 'inferenceExtension.pluginsCustomConfig.precise-prefix-cache-aware-plugins\.yaml'=guides/precise-prefix-cache-aware/scheduler/plugins/xpu.yaml
# The scheduler chart renders this file's content into the plugins ConfigMap
# under the precise-prefix-cache-aware-plugins.yaml key, overriding the
# Qwen/Qwen3-32B default that the shared values file ships for nvidia-gpu.
apiVersion: inference.networking.x-k8s.io/v1alpha1
kind: EndpointPickerConfig
plugins:
  - type: tokenizer
    parameters:
      modelName: Qwen/Qwen3-0.6B
      udsTokenizerConfig:
        socketFile: /tmp/tokenizer/tokenizer-uds.socket
  - type: single-profile-handler
  - type: decode-filter
  - type: precise-prefix-cache-scorer
    parameters:
      tokenProcessorConfig:
        blockSize: 64           # must match vLLM --block-size in patch-vllm.yaml
      indexerConfig:
        speculativeIndexing: true
        tokenizersPoolConfig:
          modelName: Qwen/Qwen3-0.6B
          uds:
            socketFile: /tmp/tokenizer/tokenizer-uds.socket
        kvBlockIndexConfig:
          enableMetrics: true
      kvEventsConfig:
        topicFilter: "kv@"
        concurrency: 4
        discoverPods: false
        zmqEndpoint: "tcp://*:5556"
  - type: kv-cache-utilization-scorer
  - type: queue-scorer
  - type: max-score-picker
schedulingProfiles:
  - name: default
    plugins:
      - pluginRef: decode-filter
      - pluginRef: tokenizer
      - pluginRef: precise-prefix-cache-scorer
        weight: 2.0
      - pluginRef: kv-cache-utilization-scorer
        weight: 1.0
      - pluginRef: queue-scorer
        weight: 1.0
      - pluginRef: max-score-picker
