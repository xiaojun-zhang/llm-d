apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
patches:
  - target:
      kind: Deployment
      name: decode
    patch: |-
      - op: add
        path: /spec/template/spec/nodeSelector
        value:
          cloud.google.com/gke-tpu-topology: "2x4"
          cloud.google.com/gke-tpu-accelerator: "tpu-v6e-slice"
  - target:
      kind: Deployment
      name: prefill
    patch: |-
      - op: add
        path: /spec/template/spec/nodeSelector
        value:
          cloud.google.com/gke-tpu-topology: "2x4"
          cloud.google.com/gke-tpu-accelerator: "tpu-v6e-slice"
