apiVersion: apps/v1
kind: Deployment
metadata:
  name: prefill
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: modelserver
          command: ["vllm", "serve"]
          args:
            - "meta-llama/Llama-3.3-70B-Instruct"
            - "--disable-uvicorn-access-log"
            - "--tensor-parallel-size=8"
            - "--max-model-len=32000"
            - "--kv-transfer-config"
            - '{"kv_connector":"TPUConnector", "kv_connector_module_path":"tpu_inference.distributed.tpu_connector", "kv_role":"kv_producer", "kv_ip":"$(POD_IP)"}'
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: TPU_SIDE_CHANNEL_PORT
              value: "9600"
            - name: TPU_KV_TRANSFER_PORT
              value: "9100"
          ports:
            - containerPort: 9100
              name: tpu-kv-transfer
              protocol: TCP
            - containerPort: 9600
              name: tpu-pd-coord
              protocol: TCP
          resources:
            limits:
              cpu: "16"
              memory: 64Gi
            requests:
              cpu: "16"
              memory: 64Gi
          volumeMounts:
            - mountPath: /dev/shm
              name: shm
            - mountPath: /.cache
              name: torch-compile-cache
            - mountPath: /.config
              name: metrics-volume
          startupProbe:
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 120
          livenessProbe:
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
        - name: torch-compile-cache
          emptyDir: {}
        - name: metrics-volume
          emptyDir: {}
