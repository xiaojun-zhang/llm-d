apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../../recipes/modelserver/base/single-host/pd/vllm

namePrefix: pd-vllm-

images:
  - name: REPLACE_MODEL_SERVER_IMAGE
    newName: docker.io/vllm/vllm-tpu
    newTag: v0.13.2


labels:
  - pairs:
      llm-d.ai/model: Llama-3.3-70B-Instruct
      llm-d.ai/guide: pd-disaggregation
      llm-d.ai/accelerator-variant: tpu
      llm-d.ai/accelerator-vendor: google
      inference.networking.k8s.io/engine-type: vllm
    includeSelectors: true
    includeTemplates: true
    fields:
      - version: v1
        kind: ServiceAccount
        path: metadata/labels
        create: true
      - group: apps
        version: v1
        kind: Deployment
        path: metadata/labels
        create: true
      - group: apps
        version: v1
        kind: Deployment
        path: spec/selector/matchLabels
        create: true
      - group: apps
        version: v1
        kind: Deployment
        path: spec/template/metadata/labels
        create: true
      - group: monitoring.coreos.com
        version: v1
        kind: PodMonitor
        path: metadata/labels
        create: true
      - group: monitoring.coreos.com
        version: v1
        kind: PodMonitor
        path: spec/selector/matchLabels
        create: true
patches:
  - path: patch-decode.yaml
  - path: patch-prefill.yaml
  - target:
      kind: Deployment
      name: decode
    patch: |-
      - op: add
        path: /spec/template/spec/nodeSelector
        value:
          cloud.google.com/gke-tpu-topology: "2x4"
          cloud.google.com/gke-tpu-accelerator: "tpu-v6e-slice"
  - target:
      kind: Deployment
      name: prefill
    patch: |-
      - op: add
        path: /spec/template/spec/nodeSelector
        value:
          cloud.google.com/gke-tpu-topology: "2x4"
          cloud.google.com/gke-tpu-accelerator: "tpu-v6e-slice"
