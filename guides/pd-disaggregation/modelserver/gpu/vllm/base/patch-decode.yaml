apiVersion: apps/v1
kind: Deployment
metadata:
  name: decode
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: modelserver
          command: ["vllm", "serve"]
          # Include all args in overlay patch for consistency
          args:
            - "openai/gpt-oss-120b"
            - "--disable-access-log-for-endpoints=/health,/metrics,/v1/models"
            - "--tensor-parallel-size=4"
            - "--block-size"
            - "128"
            - "--kv-transfer-config"
            - '{"kv_connector":"NixlConnector", "kv_role":"kv_both"}'
            - "--port"
            - "8200"
            # Uncomment for distributed tracing
            # - "--otlp-traces-endpoint=http://otel-collector:4317"
            # - "--collect-detailed-traces=all"
          env:
            - name: VLLM_NIXL_SIDE_CHANNEL_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          #   # Uncomment for distributed tracing env vars
          #   - name: OTEL_SERVICE_NAME
          #     value: "vllm-decode"
          #   - name: OTEL_EXPORTER_OTLP_ENDPOINT
          #     value: "http://otel-collector:4317"
          #   - name: OTEL_TRACES_EXPORTER
          #     value: "otlp"
          #   - name: OTEL_TRACES_SAMPLER
          #     value: "parentbased_traceidratio"
          #   - name: OTEL_TRACES_SAMPLER_ARG
          #     value: "0.1"
          resources:
            limits:
              cpu: "16"
              memory: 64Gi
              nvidia.com/gpu: "4"
            requests:
              cpu: "16"
              memory: 64Gi
              nvidia.com/gpu: "4"
          volumeMounts:
            - mountPath: /dev/shm
              name: shm
            - mountPath: /.cache
              name: torch-compile-cache
          startupProbe:
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 120
          livenessProbe:
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 20Gi
        - name: torch-compile-cache
          emptyDir: {}
