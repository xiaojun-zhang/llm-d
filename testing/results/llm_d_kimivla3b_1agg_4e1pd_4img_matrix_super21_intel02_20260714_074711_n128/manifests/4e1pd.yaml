apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: pd
    app.kubernetes.io/name: llmd-kimivla3b-epd
    llm-d.ai/accelerator-topology: h200-b70
    llm-d.ai/accelerator-variant: gpu
    llm-d.ai/accelerator-vendor: nvidia
    llm-d.ai/engine-type: sglang
    llm-d.ai/guide: kimivla3b-epd-4e1pd
    llm-d.ai/model: kimivla3b
    llm-d.ai/role: decode
    llm-d.ai/topology: 4e1pd
  name: llmd-kimivla3b-4e1pd-sglang-decode
  namespace: shared-infra
spec:
  progressDeadlineSeconds: 3600
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: pd
      app.kubernetes.io/name: llmd-kimivla3b-epd
      llm-d.ai/accelerator-topology: h200-b70
      llm-d.ai/engine-type: sglang
      llm-d.ai/guide: kimivla3b-epd-4e1pd
      llm-d.ai/model: kimivla3b
      llm-d.ai/role: decode
      llm-d.ai/topology: 4e1pd
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/component: pd
        app.kubernetes.io/name: llmd-kimivla3b-epd
        llm-d.ai/accelerator-topology: h200-b70
        llm-d.ai/accelerator-variant: gpu
        llm-d.ai/accelerator-vendor: nvidia
        llm-d.ai/engine-type: sglang
        llm-d.ai/guide: kimivla3b-epd-4e1pd
        llm-d.ai/model: kimivla3b
        llm-d.ai/role: decode
        llm-d.ai/topology: 4e1pd
    spec:
      containers:
      - args:
        - |
          exec python3 -m sglang.launch_server \
            --model-path=/mnt/weka/data/llm-d-models-pv/hub/models--moonshotai--Kimi-VL-A3B-Instruct/snapshots/main \
            --served-model-name=moonshotai/Kimi-VL-A3B-Instruct \
            --host=0.0.0.0 \
            --port=8200 \
            --trust-remote-code \
            --enable-multimodal \
            --skip-server-warmup \
            --language-only \
            --encoder-transfer-backend=zmq_to_scheduler \
            --encoder-urls \
            http://llmd-kimivla3b-4e1pd-sglang-encode-0.shared-infra.svc.cluster.local:8000 \
            http://llmd-kimivla3b-4e1pd-sglang-encode-1.shared-infra.svc.cluster.local:8000 \
            http://llmd-kimivla3b-4e1pd-sglang-encode-2.shared-infra.svc.cluster.local:8000 \
            http://llmd-kimivla3b-4e1pd-sglang-encode-3.shared-infra.svc.cluster.local:8000 \
            --dtype=auto \
            --kv-cache-dtype=fp8_e4m3 \
            --tensor-parallel-size=1 \
            --mem-fraction-static=0.80 \
            --prefill-max-requests=4 \
            --max-running-requests=32 \
            --chunked-prefill-size=65536 \
            --max-prefill-tokens=65536 \
            --max-total-tokens=250000 \
            --disable-cuda-graph \
            --page-size=16 \
            --disable-radix-cache \
            --log-level=info \
            --enable-metrics \
            --uvicorn-access-log-exclude-prefixes=/metrics
        command:
        - /bin/sh
        - -lc
        env:
        - name: CUDA_VISIBLE_DEVICES
          value: "0"
        - name: SGLANG_ENCODER_BOOTSTRAP_HEALTH_CHECK_INTERVAL
          value: "0"
        - name: HF_HOME
          value: /mnt/weka/data/llm-d-models-pv
        - name: HF_HUB_CACHE
          value: /mnt/weka/data/llm-d-models-pv/hub
        - name: HF_HUB_OFFLINE
          value: "1"
        - name: TRANSFORMERS_CACHE
          value: /mnt/weka/data/llm-d-models-pv/hub
        - name: HF_MODULES_CACHE
          value: /tmp/hf_modules
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: http_proxy
          value: http://proxy-dmz.intel.com:911
        - name: https_proxy
          value: http://proxy-dmz.intel.com:912
        - name: no_proxy
          value: 127.0.0.1,localhost,.svc,.cluster.local,172.26.0.0/16,10.66.0.0/16,10.210.0.0/16
        envFrom:
        - secretRef:
            name: hf-token-secret
        image: amr-registry.caas.intel.com/taas/scalable-deploy-intel/main_dockerfile.dynamo_gpu:477-e3682ee
        livenessProbe:
          failureThreshold: 10
          httpGet:
            path: /v1/models
            port: modelserver
          initialDelaySeconds: 1800
          periodSeconds: 30
          timeoutSeconds: 30
        name: modelserver
        ports:
        - containerPort: 8200
          name: modelserver
          protocol: TCP
        - containerPort: 5600
          name: nixl
          protocol: TCP
        readinessProbe:
          failureThreshold: 6
          httpGet:
            path: /v1/models
            port: modelserver
          periodSeconds: 10
          timeoutSeconds: 30
        resources:
          claims:
          - name: gpu
          limits:
            cpu: "32"
            memory: 160Gi
          requests:
            cpu: "16"
            memory: 96Gi
        startupProbe:
          failureThreshold: 180
          httpGet:
            path: /v1/models
            port: modelserver
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 30
        volumeMounts:
        - mountPath: /mnt/weka/data/llm-d-models-pv
          name: model-cache
          readOnly: true
        - mountPath: /dev/shm
          name: shm
      imagePullSecrets:
      - name: amr-caas-registry
      - name: amr-idc-registry
      - name: amr-idc-registry-updated
      initContainers:
      - args:
        - --port=8000
        - --vllm-port=8200
        - --kv-connector=nixlv2
        - --zap-log-level=1
        - --secure-proxy=false
        image: ghcr.io/llm-d/llm-d-router-disagg-sidecar:v0.9.0
        imagePullPolicy: Always
        name: routing-proxy
        ports:
        - containerPort: 8000
          name: sidecar
          protocol: TCP
        resources: {}
        restartPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
      - args:
        - |
          set -eu
          for host in \
            llmd-kimivla3b-4e1pd-sglang-encode-0.shared-infra.svc.cluster.local \
            llmd-kimivla3b-4e1pd-sglang-encode-1.shared-infra.svc.cluster.local \
            llmd-kimivla3b-4e1pd-sglang-encode-2.shared-infra.svc.cluster.local \
            llmd-kimivla3b-4e1pd-sglang-encode-3.shared-infra.svc.cluster.local
          do
            echo "waiting for ${host}:8000"
            i=0
            until python3 - "${host}" <<'PY'
          import sys
          import socket

          try:
              with socket.create_connection((sys.argv[1], 8000), timeout=5):
                  raise SystemExit(0)
          except Exception:
              raise SystemExit(1)
          PY
            do
              i=$((i + 1))
              if [ "${i}" -ge 360 ]; then
                echo "timed out waiting for ${host}:8000" >&2
                exit 1
              fi
              sleep 5
            done
          done
          echo "all encoder ports are reachable"
        command:
        - /bin/sh
        - -lc
        image: amr-registry.caas.intel.com/taas/scalable-deploy-intel/main_dockerfile.dynamo_gpu:477-e3682ee
        imagePullPolicy: IfNotPresent
        name: wait-encoders
        resources:
          limits:
            cpu: "2"
            memory: 2Gi
          requests:
            cpu: "1"
            memory: 1Gi
      nodeSelector:
        kubernetes.io/hostname: sc09super21-h200
      resourceClaims:
      - name: gpu
        resourceClaimTemplateName: llmd-kimivla3b-4e1pd-sglang-llmd-kimivla3b-super21-h200-gpu7
      securityContext:
        fsGroup: 1000
      serviceAccountName: llmd-kimivla3b-4e1pd-sglang-sa
      terminationGracePeriodSeconds: 120
      volumes:
      - hostPath:
          path: /mnt/weka/data/llm-d-models-pv
          type: Directory
        name: model-cache
      - emptyDir:
          medium: Memory
          sizeLimit: 64Gi
        name: shm
