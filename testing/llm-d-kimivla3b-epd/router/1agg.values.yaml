## Kimi-VL-A3B 1AGG router overrides.
## Layer on top of guides/recipes/router/base.values.yaml.

router:
  extraServicePorts:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 8081

  epp:
    pluginsConfigFile: "kimivla3b-1agg-config.yaml"
    pluginsCustomConfig:
      kimivla3b-1agg-config.yaml: |
        apiVersion: llm-d.ai/v1alpha1
        kind: EndpointPickerConfig
        plugins:
        - type: queue-scorer
        - type: kv-cache-utilization-scorer
        - type: prefix-cache-scorer
        - type: no-hit-lru-scorer
        - type: token-producer
          parameters:
            estimate:
              image:
                mode: dynamic
                defaultResolution:
                  width: 1920
                  height: 1080
                dynamic:
                  factor: 1024
        - type: approx-prefix-cache-producer
        schedulingProfiles:
        - name: default
          plugins:
          - pluginRef: queue-scorer
            weight: 2
          - pluginRef: kv-cache-utilization-scorer
            weight: 2
          - pluginRef: prefix-cache-scorer
            weight: 3
          - pluginRef: no-hit-lru-scorer
            weight: 2

  modelServers:
    matchLabels:
      llm-d.ai/guide: "kimivla3b-epd-1agg"
